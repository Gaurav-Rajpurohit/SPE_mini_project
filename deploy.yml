---
- name: Deploy Calculator Container
  hosts: localhost
  connection: local
  gather_facts: no

  tasks:

    - name: Stop old container
      shell: docker stop calculator || true

    - name: Remove old container
      shell: docker rm calculator || true

    - name: Pull latest image
      shell: docker pull gaurav1374/calculator:latest

    - name: Run calculator container
      shell: docker run -d --name calculator -p 8080:8080 gaurav1374/calculator:latest
